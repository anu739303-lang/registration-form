<html>
<head>
    <title>BBDU Registration Form</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
<div class="container">

<h3>BBDU Registration Form</h3>

<form action="submit.php" method="post">
<label for="fname">First Name:</label>
<input type="text" placeholder="first name" required><br><br>
<label for="lname">Last Name:</label>
<input type="text" placeholder="lastname" required><br><br>
<label for="rollno">Roll No:</label>
<input type="text" placeholder="roll no" required><br><br>
<label for="phone">Phone No:</label>
<input type="tel" placeholder="phone no" required><br><br>
<label for="address">Address:</label>
<input type="text" placeholder="address"><br><br>
<label for="email">Email:</label>
<input type="email" placeholder="email" required><br><br>
<label for="password">Password:</label>
<input type="password" placeholder="password" required><br><br>

    <button type="submit">Submit</button><br><br>
    <button type="reset">Reset</button>
</form>
</div>
</body>
</html>
